

services:

  mysql:
    image: mysql:8.0-oraclelinux8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb

  backend:
    build: ./backend
    container_name: backend
    ports:
      -"5000:5000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - backend